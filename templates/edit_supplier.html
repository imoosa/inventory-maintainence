{% extends "base.html" %}
{% block title %}Edit Supplier — AssetPro{% endblock %}
{% block topbar_title %}Edit Supplier{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">EDIT SUPPLIER</div>
    <div class="page-subtitle">// {{ supplier.name | upper }}</div>
  </div>
  <a href="{{ url_for('suppliers') }}" class="btn btn-outline">
    <i class="fa-solid fa-arrow-left"></i> Back
  </a>
</div>

<form method="POST" enctype="multipart/form-data">

  <!-- ── SUPPLIER DETAILS ── -->
  <div class="card">
    <div class="card-header">
      <i class="fa-solid fa-truck text-accent"></i>
      <span class="card-title">Supplier Details</span>
    </div>
    <div class="card-body">
      <div class="grid-2">
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label">Company Name *</label>
          <input type="text" name="name" class="form-control"
                 value="{{ supplier.name }}" required placeholder="Full company name">
        </div>
        <div class="form-group">
          <label class="form-label">Contact Person</label>
          <input type="text" name="contact_person" class="form-control"
                 value="{{ supplier.contact_person or '' }}" placeholder="Primary contact name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ supplier.email or '' }}" placeholder="contact@company.com">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ supplier.phone or '' }}" placeholder="+91 98765 43210">
        </div>
        <div class="form-group">
          <label class="form-label">Alternative Phone</label>
          <input type="text" name="alternative_phone" class="form-control"
                 value="{{ supplier.alternative_phone or '' }}">
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label">Address</label>
          <textarea name="address" class="form-control" rows="2"
                    placeholder="Full address">{{ supplier.address or '' }}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">GST Number</label>
          <input type="text" name="gst_number" class="form-control"
                 value="{{ supplier.gst_number or '' }}" placeholder="22AAAAA0000A1Z5">
        </div>
        <div class="form-group">
          <label class="form-label">Payment Terms</label>
          <input type="text" name="payment_terms" class="form-control"
                 value="{{ supplier.payment_terms or '' }}" placeholder="e.g. Net 30 days">
        </div>
        <div class="form-group">
          <label class="form-label">Rating (1–5)</label>
          <select name="rating" class="form-control">
            {% for r in range(1,6) %}
            <option value="{{ r }}" {% if supplier.rating == r %}selected{% endif %}>
              {{ '★' * r }}{{ '☆' * (5-r) }} ({{ r }}/5)
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2"
                    placeholder="Any special notes">{{ supplier.notes or '' }}</textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- ── LOCATION ── -->
  <div class="card" style="margin-top:16px">
    <div class="card-header">
      <i class="fa-solid fa-location-dot text-accent"></i>
      <span class="card-title">Location</span>
    </div>
    <div class="card-body">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Main Location</label>
          <input type="text" name="main_location" class="form-control"
                 value="{{ supplier.main_location or '' }}"
                 placeholder="e.g. Building A, Main Campus, Site 1">
        </div>
        <div class="form-group">
          <label class="form-label">Sub Location</label>
          <input type="text" name="sub_location" class="form-control"
                 value="{{ supplier.sub_location or '' }}"
                 placeholder="e.g. Floor 2, North Wing, Room 104">
        </div>
      </div>
    </div>
  </div>

  <div class="flex gap-8" style="justify-content:flex-end; margin-top:16px">
    <a href="{{ url_for('suppliers') }}" class="btn btn-outline btn-lg">Cancel</a>
    <button type="submit" class="btn btn-primary btn-lg">
      <i class="fa-solid fa-floppy-disk"></i> Save Changes
    </button>
  </div>
</form>
{% endblock %}
